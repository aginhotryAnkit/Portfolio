<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 44" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#818CF8"/>
    </linearGradient>
  </defs>

  <!-- Hexagon icon mark -->
  <polygon points="20,4 34,12 34,28 20,36 6,28 6,12" fill="url(#grad1)" opacity="0.15"/>
  <polygon points="20,4 34,12 34,28 20,36 6,28 6,12" fill="none" stroke="url(#grad1)" stroke-width="1.5"/>

  <!-- < > code brackets inside hex -->
  <text x="10" y="25" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="url(#grad1)">&lt;/&gt;</text>

  <!-- Name text -->
  <text x="44" y="20" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#0F172A" letter-spacing="0.3">ANKIT</text>
  <text x="44" y="34" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#64748B" letter-spacing="2">AGNIHOTRY</text>

  <!-- Accent dot -->
  <circle cx="152" cy="14" r="3" fill="url(#grad2)"/>
</svg>
